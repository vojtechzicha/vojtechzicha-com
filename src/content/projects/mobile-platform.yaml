sections:
  - heading: { en: 'Context', cs: 'Kontext' }
    body:
      - en: >-
          Czech's largest automotive producer maintains a family of mobile
          applications built by several teams in parallel. A new platform
          version was the opportunity to align them on one architecture.
        cs: >-
          Největší český výrobce automobilů udržuje rodinu mobilních
          aplikací, které paralelně staví několik týmů. Nová verze platformy
          byla příležitostí sjednotit je na jedné architektuře.
  - heading: { en: 'My role', cs: 'Moje role' }
    body:
      - en: >-
          As Solution Architect for Automotive and IoT at eMan I designed the
          architecture of the new platform version: Clean Architecture
          principles for the mobile applications and cloud-hosted
          microservices for the backend. I then took the patterns through
          approval and deployment across several application teams.
        cs: >-
          Jako Solution Architect pro Automotive a IoT v eMan jsem navrhl
          architekturu nové verze platformy: principy Clean Architecture pro
          mobilní aplikace a cloudové mikroslužby pro backend. Nové vzory
          jsem následně provedl schválením a nasazením napříč několika
          aplikačními týmy.
