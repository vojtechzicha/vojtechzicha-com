sections:
  - heading: { en: 'Context', cs: 'Kontext' }
    body:
      - en: >-
          A large appliance producer wanted to activate its customers
          directly: a loyalty programme for consumers and a companion
          experience for business partners, neither of which existing
          company systems could carry.
        cs: >-
          Velký výrobce domácích spotřebičů chtěl aktivovat zákazníky přímo:
          věrnostní program pro spotřebitele a doprovodnou aplikaci pro
          obchodní partnery — ani jedno nemohly stávající firemní systémy
          unést.
  - heading: { en: 'The platform', cs: 'Platforma' }
    body:
      - en: >-
          I designed the architecture for two greenfield mobile applications
          (B2C and B2B) and the custom backend platform behind them. The
          backend covers AI product recognition — customers register a
          product by photographing it — loyalty system management, and
          integration into the producer's existing systems. The whole
          platform runs on GCP using containerized technology.
        cs: >-
          Navrhl jsem architekturu dvou greenfield mobilních aplikací (B2C a
          B2B) a vlastní backendové platformy za nimi. Backend pokrývá AI
          rozpoznávání produktů — zákazník zaregistruje výrobek tím, že ho
          vyfotí — správu věrnostního programu a integraci do stávajících
          systémů výrobce. Celá platforma běží na GCP v kontejnerech.
