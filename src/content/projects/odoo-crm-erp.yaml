sections:
  - heading: { en: 'Context', cs: 'Kontext' }
    body:
      - en: >-
          A growing solar vendor had outgrown its IT landscape. The business
          needed one coherent platform for CRM and ERP — and a way for the
          systems around it to exchange data reliably as volumes grew.
        cs: >-
          Rostoucí dodavatel solárních řešení přerostl své IT prostředí.
          Firma potřebovala jednu soudržnou platformu pro CRM a ERP — a
          způsob, jak si okolní systémy budou s rostoucími objemy spolehlivě
          vyměňovat data.
  - heading: { en: 'My role', cs: 'Moje role' }
    body:
      - en: >-
          As a freelance architect I led the transformation effort: moving
          the landscape to a new technology set centred on a custom-developed
          Odoo CRM/ERP platform, and designing the large-scale integration
          platform — built on event-sourcing and queuing principles — that
          connects it to the rest of the company.
        cs: >-
          Jako freelance architekt jsem transformaci vedl: převod prostředí
          na nové technologie s centrem v zákaznicky vyvinuté CRM/ERP
          platformě Odoo a návrh rozsáhlé integrační platformy — postavené
          na principech event sourcingu a front zpráv — která ji propojuje
          se zbytkem firmy.
